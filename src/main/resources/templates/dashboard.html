<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📝 My Todo List</h1>
        <div>
            <span th:text="'Welcome, ' + ${username}"></span>
            <a th:href="@{/logout}">Logout</a>
        </div>
    </div>

    <form th:action="@{/todos/add}" method="post">
        <input type="text" name="title" placeholder="Add new todo..." required/>
        <button type="submit">Add</button>
    </form>

    <ul class="todo-list">
        <li th:each="todo : ${todos}" th:class="${todo.completed} ? 'completed' : ''">
            <span th:text="${todo.title}"></span>
            <div class="actions">
                <form th:action="@{/todos/toggle/{id}(id=${todo.id})}" method="post" style="display:inline">
                    <button type="submit" th:text="${todo.completed} ? 'Undo' : 'Done'"></button>
                </form>
                <form th:action="@{/todos/delete/{id}(id=${todo.id})}" method="post" style="display:inline">
                    <button type="submit" class="delete">Delete</button>
                </form>
            </div>
        </li>
    </ul>
</div>
</body>
</html>
